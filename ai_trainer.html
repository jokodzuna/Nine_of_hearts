<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nine Hearts - AI Training Sandbox</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #1a1a1a;
            color: #fff;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #4CAF50;
        }

        .controls {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .control-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #aaa;
        }

        select, button {
            padding: 10px;
            font-size: 16px;
            border-radius: 4px;
            border: none;
        }

        select {
            width: 100%;
            background: #333;
            color: #fff;
        }

        button {
            background: #4CAF50;
            color: white;
            cursor: pointer;
            margin-right: 10px;
            margin-top: 10px;
        }

        button:hover {
            background: #45a049;
        }

        button.secondary {
            background: #666;
        }

        button.secondary:hover {
            background: #555;
        }

        .game-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .player-area {
            background: #2a2a2a;
            padding: 15px;
            border-radius: 8px;
        }

        .player-area.active {
            border: 2px solid #4CAF50;
        }

        .player-name {
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 18px;
        }

        .cards {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            min-height: 60px;
        }

        .card {
            width: 40px;
            height: 56px;
            background: white;
            border: 1px solid #333;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }

        .card.red {
            color: #d32f2f;
        }

        .card.black {
            color: #000;
        }

        .card.selected {
            transform: translateY(-5px);
            background: #fff9c4;
        }

        .card-back {
            width: 40px;
            height: 56px;
            background: #1976D2;
            border: 1px solid #0D47A1;
            border-radius: 4px;
        }

        .pile-area {
            background: #2a2a2a;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .pile-info {
            margin-bottom: 10px;
        }

        .message {
            background: #333;
            padding: 10px;
            border-radius: 4px;
            margin-top: 10px;
            min-height: 30px;
        }

        .stats {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 8px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #444;
        }

        .game-log {
            background: #1a1a1a;
            padding: 10px;
            border-radius: 4px;
            max-height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
            margin-top: 10px;
        }

        .game-over {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .game-over-content {
            background: #2a2a2a;
            padding: 40px;
            border-radius: 8px;
            text-align: center;
        }

        .game-over h2 {
            color: #4CAF50;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 Nine Hearts - AI Training Sandbox</h1>

        <!-- Controls -->
        <div class="controls">
            <h2>Game Controls</h2>
            
            <div class="control-group">
                <label>AI Strategy for Bot 1:</label>
                <select id="ai1Strategy">
                    <option value="conservative">Conservative (Preserve Aces/Kings)</option>
                    <option value="aggressive">Aggressive (Play Everything)</option>
                    <option value="balanced" selected>Balanced (Smart Mix)</option>
                </select>
            </div>

            <div class="control-group">
                <label>AI Strategy for Bot 2:</label>
                <select id="ai2Strategy">
                    <option value="conservative">Conservative</option>
                    <option value="aggressive">Aggressive</option>
                    <option value="balanced" selected>Balanced</option>
                </select>
            </div>

            <div class="control-group">
                <label>AI Strategy for Bot 3:</label>
                <select id="ai3Strategy">
                    <option value="conservative">Conservative</option>
                    <option value="aggressive">Aggressive</option>
                    <option value="balanced" selected>Balanced</option>
                </select>
            </div>

            <div>
                <button onclick="newGame()">New Game (You Play)</button>
                <button onclick="autoBattle()" class="secondary">Auto-Battle (Watch AI)</button>
                <button onclick="runSimulation(100)" class="secondary">Simulate 100 Games</button>
                <button onclick="togglePause()" class="secondary" id="pauseResumeBtn" type="button">Pause Game</button>
            </div>
        </div>

        <!-- Game Area -->
        <div class="game-area">
            <div class="player-area" id="player0">
                <div class="player-name">You (Human)</div>
                <div class="cards" id="player0Cards"></div>
                <div style="margin-top: 10px;">
                    <button onclick="playCards()" style="font-size: 14px;">Play Selected</button>
                    <button onclick="drawCards()" class="secondary" style="font-size: 14px;">Draw</button>
                </div>
            </div>

            <div class="player-area" id="player1">
                <div class="player-name">AI Bot 1</div>
                <div class="cards" id="player1Cards"></div>
            </div>

            <div class="player-area" id="player2">
                <div class="player-name">AI Bot 2</div>
                <div class="cards" id="player2Cards"></div>
            </div>

            <div class="player-area" id="player3">
                <div class="player-name">AI Bot 3</div>
                <div class="cards" id="player3Cards"></div>
            </div>
        </div>

        <!-- Pile -->
            <div class="pile-area">
            <div class="pile-info">
                <strong>Top Card:</strong> <span id="topCard">9♥</span> | 
                <strong>Cards in Pile:</strong> <span id="pileCount">0</span> |
                <strong>Current Turn:</strong> <span id="currentTurn">-</span>
            </div>
            <div class="cards" id="pileCards" style="margin: 10px 0;"></div>
            <div class="message" id="message">Game ready. Click "New Game" to start!</div>
        </div>

        <!-- Statistics -->
        <div class="stats">
            <h2>Statistics</h2>
            <div class="stat-row">
                <span>Games Played:</span>
                <span id="gamesPlayed">0</span>
            </div>
            <div class="stat-row">
                <span>Human Wins:</span>
                <span id="humanWins">0</span>
            </div>
            <div class="stat-row">
                <span>Conservative AI Wins:</span>
                <span id="conservativeWins">0</span>
            </div>
            <div class="stat-row">
                <span>Aggressive AI Wins:</span>
                <span id="aggressiveWins">0</span>
            </div>
            <div class="stat-row">
                <span>Balanced AI Wins:</span>
                <span id="balancedWins">0</span>
            </div>
            <button onclick="resetStats()" class="secondary">Reset Statistics</button>
            
            <div class="game-log" id="gameLog"></div>
        </div>
    </div>

    <script>
        // ============================================
        // GAME STATE
        // ============================================
        
        const suits = ['♠', '♥', '♦', '♣'];
        const ranks = [9, 10, 'J', 'Q', 'K', 'A'];
        const rankValues = { 9: 9, 10: 10, 'J': 11, 'Q': 12, 'K': 13, 'A': 14 };

        let gameState = {
            players: [
                { name: 'You', hand: [], eliminated: false, isAI: false, strategy: null },
                { name: 'AI Bot 1', hand: [], eliminated: false, isAI: true, strategy: 'balanced' },
                { name: 'AI Bot 2', hand: [], eliminated: false, isAI: true, strategy: 'balanced' },
                { name: 'AI Bot 3', hand: [], eliminated: false, isAI: true, strategy: 'balanced' }
            ],
            currentPlayer: 0,
            pile: [],
            topCard: { rank: 9, suit: '♥' },
            selectedCards: [],
            gameOver: false,
            autoBattleMode: false,
            fastMode: false,
            simulationMode: false,
            simulationTotal: 0,
            simulationCount: 0,
            aiMoveHistory: [[], [], [], []],
            isPaused: false
        };

        let stats = {
            gamesPlayed: 0,
            humanWins: 0,
            conservativeWins: 0,
            aggressiveWins: 0,
            balancedWins: 0
        };

        // ============================================
        // GAME SETUP
        // ============================================

        function createDeck() {
            const deck = [];
            for (let suit of suits) {
                for (let rank of ranks) {
                    deck.push({ rank, suit, value: rankValues[rank] });
                }
            }
            for (let i = deck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [deck[i], deck[j]] = [deck[j], deck[i]];
            }
            return deck;
        }

        function dealCards(deck) {
            for (let i = 0; i < 6; i++) {
                gameState.players.forEach(player => {
                    if (!player.eliminated) {
                        player.hand.push(deck.pop());
                    }
                });
            }
            gameState.pile = []; // will be set in findStartingPlayer: 9♥ at bottom, then rest of deck
            gameState.players.forEach(player => {
                player.hand.sort((a, b) => rankValues[a.rank] - rankValues[b.rank]);
            });
        }

        function findStartingPlayer() {
            const nineHearts = { rank: 9, suit: '♥', value: 9 };
            for (let i = 0; i < gameState.players.length; i++) {
                const has9Hearts = gameState.players[i].hand.find(c => c.rank === 9 && c.suit === '♥');
                if (has9Hearts) {
                    gameState.players[i].hand = gameState.players[i].hand.filter(c => !(c.rank === 9 && c.suit === '♥'));
                    // 9♥ stays in the pile forever as the base (bottom of pile)
                    gameState.pile = [nineHearts];
                    gameState.topCard = nineHearts;
                    gameState.currentPlayer = (i + 1) % 4;
                    return;
                }
            }
        }

        function newGame() {
            gameState.autoBattleMode = false;
            gameState.fastMode = false;
            gameState.players[0].isAI = false;
            
            // Update AI strategies from dropdowns
            gameState.players[1].strategy = document.getElementById('ai1Strategy').value;
            gameState.players[2].strategy = document.getElementById('ai2Strategy').value;
            gameState.players[3].strategy = document.getElementById('ai3Strategy').value;
            
            initGame();
        }

        function autoBattle() {
            gameState.autoBattleMode = true;
            gameState.fastMode = true;
            gameState.players[0].isAI = true;
            gameState.players[0].strategy = 'balanced';
            
            gameState.players[1].strategy = document.getElementById('ai1Strategy').value;
            gameState.players[2].strategy = document.getElementById('ai2Strategy').value;
            gameState.players[3].strategy = document.getElementById('ai3Strategy').value;
            
            initGame();
        }

        function initGame() {
            gameState.players.forEach(p => {
                p.hand = [];
                p.eliminated = false;
            });
            gameState.selectedCards = [];
            gameState.gameOver = false;
            gameState.currentPlayer = 0;
            gameState.aiMoveHistory = [[], [], [], []];
            gameState.isPaused = false;
            syncPauseButton();
            
            const deck = createDeck();
            dealCards(deck);
            findStartingPlayer();
            
            updateDisplay();
            showMessage("Game started! " + gameState.players[gameState.currentPlayer].name + "'s turn.");
            
            if (gameState.players[gameState.currentPlayer].isAI) {
                setTimeout(processAITurn, gameState.fastMode ? 100 : 1000);
            }
        }

        // ============================================
        // DISPLAY
        // ============================================

        function updateDisplay() {
            // Update each player's cards
            for (let i = 0; i < 4; i++) {
                const player = gameState.players[i];
                const cardsDiv = document.getElementById(`player${i}Cards`);
                cardsDiv.innerHTML = '';
                
                const playerDiv = document.getElementById(`player${i}`);
                playerDiv.classList.toggle('active', i === gameState.currentPlayer);
                
                if (player.eliminated) {
                    cardsDiv.innerHTML = '<div style="color: #4CAF50; font-weight: bold;">✅ SAFE</div>';
                } else if (i === 0 && !gameState.players[0].isAI) {
                    // Show human player's cards
                    player.hand.forEach((card, idx) => {
                        const cardDiv = document.createElement('div');
                        cardDiv.className = `card ${(card.suit === '♥' || card.suit === '♦') ? 'red' : 'black'}`;
                        cardDiv.textContent = card.rank + card.suit;
                        cardDiv.onclick = () => selectCard(i, idx);
                        
                        if (gameState.selectedCards.some(sc => sc.playerIndex === i && sc.cardIndex === idx)) {
                            cardDiv.classList.add('selected');
                        }
                        
                        cardsDiv.appendChild(cardDiv);
                    });
                } else {
                    // Show card backs for AI
                    player.hand.forEach(() => {
                        const cardBack = document.createElement('div');
                        cardBack.className = 'card-back';
                        cardsDiv.appendChild(cardBack);
                    });
                }
            }
            
            // Update pile info
            document.getElementById('topCard').textContent = gameState.topCard.rank + gameState.topCard.suit;
            document.getElementById('pileCount').textContent = gameState.pile.length;
            document.getElementById('currentTurn').textContent = gameState.players[gameState.currentPlayer].name;
            updatePileDisplay();
        }
        function updatePileDisplay() {
            const pileCardsDiv = document.getElementById('pileCards');
            pileCardsDiv.innerHTML = '';
            // Pile: 9♥ at bottom (left), cards on top (right). 9♥ always stays.
            const fromBottom = gameState.pile.slice().reverse();
            const toShow = fromBottom.slice(0, 6);
            toShow.forEach(card => {
                const cardDiv = document.createElement('div');
                cardDiv.className = `card ${(card.suit === '♥' || card.suit === '♦') ? 'red' : 'black'}`;
                cardDiv.textContent = card.rank + card.suit;
                cardDiv.style.marginRight = '5px';
                pileCardsDiv.appendChild(cardDiv);
            });
            if (gameState.pile.length > 6) {
                const moreText = document.createElement('span');
                moreText.textContent = `... +${gameState.pile.length - 6} more`;
                moreText.style.color = '#aaa';
                pileCardsDiv.appendChild(moreText);
            }
        }

        function showMessage(msg) {
            document.getElementById('message').textContent = msg;
            log(msg);
        }

        function syncPauseButton() {
            const btn = document.getElementById('pauseResumeBtn');
            if (!btn) return;
            btn.textContent = gameState.isPaused ? 'Resume Game' : 'Pause Game';
        }

        function togglePause() {
            gameState.isPaused = !gameState.isPaused;
            syncPauseButton();
            if (gameState.isPaused) {
                document.getElementById('message').textContent = '⏸️ PAUSED';
            } else {
                showMessage('▶️ Resumed — ' + gameState.players[gameState.currentPlayer].name + "'s turn.");
                if (!gameState.gameOver && gameState.players[gameState.currentPlayer].isAI) {
                    setTimeout(processAITurn, gameState.fastMode ? 50 : 500);
                }
            }
        }

        function log(msg) {
            const logDiv = document.getElementById('gameLog');
            const timestamp = new Date().toLocaleTimeString();
            logDiv.innerHTML += `<div>[${timestamp}] ${msg}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        // ============================================
        // PLAYER ACTIONS
        // ============================================

        function selectCard(playerIndex, cardIndex) {
            if (gameState.currentPlayer !== 0 || gameState.gameOver || gameState.autoBattleMode) return;
            
            const card = gameState.players[playerIndex].hand[cardIndex];
            const existingIndex = gameState.selectedCards.findIndex(sc => sc.playerIndex === playerIndex && sc.cardIndex === cardIndex);
            
            if (existingIndex >= 0) {
                gameState.selectedCards.splice(existingIndex, 1);
            } else {
                if (gameState.selectedCards.length === 0) {
                    gameState.selectedCards.push({ playerIndex, cardIndex, card });
                } else {
                    const firstCard = gameState.selectedCards[0].card;
                    if (card.rank === firstCard.rank) {
                        gameState.selectedCards.push({ playerIndex, cardIndex, card });
                    } else {
                        showMessage("You can only select cards of the same rank!");
                        return;
                    }
                }
            }
            
            updateDisplay();
        }

        function playCards() {
            if (gameState.currentPlayer !== 0 || gameState.gameOver || gameState.autoBattleMode) return;
            if (gameState.selectedCards.length === 0) {
                showMessage("Please select cards to play!");
                return;
            }
            
            if (!canPlayCards(gameState.selectedCards.map(sc => sc.card))) {
                showMessage("These cards cannot be played!");
                return;
            }
            
            const player = gameState.players[0];
            const sortedSelections = [...gameState.selectedCards].sort((a, b) => b.cardIndex - a.cardIndex);
            
            sortedSelections.forEach(sc => {
                const card = player.hand.splice(sc.cardIndex, 1)[0];
                gameState.pile.unshift(card);
            });
            gameState.topCard = gameState.pile[0];
            
            if (player.hand.length === 0) {
                eliminatePlayer(0);
                return;
            }
            
            nextTurn();
        }

        function drawCards() {
            if (gameState.currentPlayer !== 0 || gameState.gameOver || gameState.autoBattleMode) return;
            // 9♥ always stays in the pile (at bottom). You draw 1–3 from the top.
            const drawable = gameState.pile.length - 1;
            if (drawable <= 0) {
                showMessage("No cards to draw (only 9♥ remains – it must stay in the pile). Play a card!");
                return;
            }
            
            const player = gameState.players[0];
            const cardsToDraw = Math.min(3, drawable);
            
            for (let i = 0; i < cardsToDraw; i++) {
                player.hand.push(gameState.pile.shift());
            }
            
            player.hand.sort((a, b) => rankValues[a.rank] - rankValues[b.rank]);
            gameState.topCard = gameState.pile[0];
            updateDisplay();
            
            showMessage(`Drew ${cardsToDraw} card(s)!`);
            
            nextTurn();
        }
        function canPlayCards(cards) {
            if (cards.length === 0) return false;
            
            const rank = cards[0].rank;
            const value = rankValues[rank];
            const topValue = rankValues[gameState.topCard.rank];
            
            if (value < topValue) return false;
            if (cards.length === 1 || cards.length === 4) return true;
            if (cards.length === 3 && rank === 9 && gameState.topCard.rank === 9) return true;
            
            return false;
        }

        // ============================================
        // AI LOGIC
        // ============================================

        function serializeMoveForHistory(move) {
            if (!move || !move.action) return '';
            if (move.action === 'draw') {
                const ids = (move.cards || []).map(c => c.rank + c.suit).sort();
                return 'draw:' + ids.join(',');
            }
            const ids = (move.cards || []).map(c => c.rank + c.suit).sort();
            return 'play:' + ids.join(',');
        }

        function detectPattern(playerMoveHistory) {
            console.log('--- detectPattern (hand signature) ---');
            const history = playerMoveHistory || [];
            console.log('History length:', history.length);

            // Look at last 12 end-of-turn hand snapshots
            const last = history.slice(-12);

            function rankSignature(snapshotCards) {
                const ranks = (snapshotCards || []).map(c => String(c.rank)).sort();
                return ranks.join(',');
            }

            const signatures = last.map(s => rankSignature(s));
            console.log('Last 12 signatures:', signatures);

            const counts = {};
            for (let i = 0; i < signatures.length; i++) {
                const sig = signatures[i];
                counts[sig] = (counts[sig] || 0) + 1;
                if (counts[sig] >= 3) {
                    console.log('Pattern exists? true (signature repeated >=3 times):', {
                        signature: sig,
                        count: counts[sig]
                    });
                    return true;
                }
            }

            console.log('Pattern exists? false (counts):', counts);
            return false;
        }

        function shouldBreakPattern(player, currentPlayerIndex) {
            const hist = gameState.aiMoveHistory[currentPlayerIndex] || [];
            return detectPattern(hist);
        }

        function getActivePlayers() {
            return gameState.players.filter(p => !p.eliminated);
        }

        function getTwoPlayerOpponent(player) {
            const active = getActivePlayers();
            if (active.length !== 2) return null;
            return active.find(p => p !== player) || null;
        }

        function isEndgameDangerMode(player) {
            const active = getActivePlayers();
            if (active.length !== 2) return false;
            const opp = getTwoPlayerOpponent(player);
            if (!opp) return false;
            return opp.hand.length < 3;
        }

        function shouldPreserveAceKing(player) {
            if (isEndgameDangerMode(player)) return false;
            const opp = getTwoPlayerOpponent(player);
            if (!opp) return true;
            if (opp.hand.length < 3) return false;
            return player.hand.length >= 5;
        }

        function wouldWinGameThisTurn(player, opt) {
            return opt && opt.cards && player.hand.length === opt.cards.length;
        }

        function moveOptionEquals(a, b) {
            if (!a || !b) return false;
            if (a.count !== b.count) return false;
            const sa = a.cards.map(c => c.rank + c.suit).sort().join('|');
            const sb = b.cards.map(c => c.rank + c.suit).sort().join('|');
            return sa === sb;
        }

        function recordAiMove(playerIndex) {
            if (!gameState.aiMoveHistory[playerIndex]) gameState.aiMoveHistory[playerIndex] = [];
            const hist = gameState.aiMoveHistory[playerIndex];
            const player = gameState.players[playerIndex];

            // Record AI hand AFTER the move as array of {rank, suit}
            const snapshot = (player.hand || []).map(c => ({ rank: c.rank, suit: c.suit }));
            hist.push(snapshot);

            // Keep bounded for the detector (last 12 snapshots only)
            if (hist.length > 12) gameState.aiMoveHistory[playerIndex] = hist.slice(-12);
        }

        function pickRandomElement(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function processAITurn() {
            if (gameState.gameOver) return;
            if (gameState.isPaused) return;
            
            const player = gameState.players[gameState.currentPlayer];
            if (!player.isAI) return;
            
            const playerIndex = gameState.currentPlayer;
            const strategy = player.strategy;
            const playableOptions = findPlayableCards(player.hand);
            console.log('=== AI TURN DEBUG ===');
            console.log('Player:', player.name);
            console.log(
                'Hand snapshot history length:',
                gameState.aiMoveHistory[gameState.currentPlayer]?.length || 0
            );
            console.log(
                'Last 12 hand snapshots:',
                gameState.aiMoveHistory[gameState.currentPlayer]?.slice(-12)
            );
            // Pattern result is logged separately via breakPattern (🔴 / ✅)
            const breakPattern = shouldBreakPattern(player, gameState.currentPlayer);
            
            if (breakPattern) {
                console.log('🔴 BREAKING PATTERN - choosing alternate move', player.name);
            } else {
                console.log('✅ Normal move', player.name);
            }
            console.log(`${player.name} (${strategy}) thinking...`, {
                hand: player.hand.map(c => c.rank + c.suit),
                playableOptions: playableOptions.length,
                topCard: gameState.topCard.rank + gameState.topCard.suit,
                breakPattern
            });
            
            if (playableOptions.length > 0) {
                let move;
                if (breakPattern) {
                    const normalMove = chooseMove(playableOptions, player, strategy);
                    if (normalMove && normalMove.cards && normalMove.cards.length > 0) {
                        const remaining = playableOptions.filter(opt => !moveOptionEquals(opt, normalMove));
                        if (remaining.length > 0) {
                            move = pickRandomElement(remaining);
                        } else {
                            move = playableOptions[0];
                        }
                    } else {
                        move = normalMove;
                    }
                } else {
                    move = chooseMove(playableOptions, player, strategy);
                }
                if (!move || !move.cards || move.cards.length === 0) {
                    const drawable = gameState.pile.length - 1;
                    if (drawable > 0) {
                        const cardsToDraw = Math.min(3, drawable);
                        const drawn = [];
                        for (let i = 0; i < cardsToDraw; i++) {
                            drawn.push(gameState.pile.shift());
                            player.hand.push(drawn[drawn.length - 1]);
                        }
                        player.hand.sort((a, b) => rankValues[a.rank] - rankValues[b.rank]);
                        gameState.topCard = gameState.pile[0];
                        showMessage(`${player.name} drew ${cardsToDraw} card(s)!`);
                        recordAiMove(playerIndex);
                    }
                    setTimeout(() => nextTurn(), gameState.fastMode ? 50 : 800);
                    return;
                }
                
                console.log(`${player.name} decided to play:`, move.cards.map(c => c.rank + c.suit));
                
                move.cards.forEach(card => {
                    const index = player.hand.findIndex(c => c.rank === card.rank && c.suit === card.suit);
                    if (index >= 0) {
                        player.hand.splice(index, 1);
                        gameState.pile.unshift(card);
                    }
                });
                
                player.hand.sort((a, b) => rankValues[a.rank] - rankValues[b.rank]);
                gameState.topCard = gameState.pile[0];
                showMessage(`${player.name} played ${move.cards.length} ${move.cards[0].rank}(s)!`);
                recordAiMove(playerIndex);
                
                if (player.hand.length === 0) {
                    eliminatePlayer(gameState.currentPlayer);
                    return;
                }
                
                setTimeout(() => nextTurn(), gameState.fastMode ? 50 : 800);
            } else {
                const drawable = gameState.pile.length - 1;
                if (drawable > 0) {
                    let cardsToDraw = Math.min(3, drawable);
                    if (breakPattern && drawable > 1) {
                        const choices = [];
                        for (let n = 1; n <= Math.min(3, drawable); n++) choices.push(n);
                        cardsToDraw = pickRandomElement(choices);
                    }
                    const drawn = [];
                    for (let i = 0; i < cardsToDraw; i++) {
                        drawn.push(gameState.pile.shift());
                        player.hand.push(drawn[drawn.length - 1]);
                    }
                    player.hand.sort((a, b) => rankValues[a.rank] - rankValues[b.rank]);
                    gameState.topCard = gameState.pile[0];
                    showMessage(`${player.name} drew ${cardsToDraw} card(s)!`);
                    recordAiMove(playerIndex);
                }
                setTimeout(() => nextTurn(), gameState.fastMode ? 50 : 800);
            }
        }

        function chooseMove(playableOptions, player, strategy) {
            const handSize = player.hand.length;
            const originalOptions = playableOptions;
            const danger = isEndgameDangerMode(player);
            const preserveAK = shouldPreserveAceKing(player);
            
            // Strategy: Conservative
            if (strategy === 'conservative') {
                const hasLastAce = player.hand.filter(c => c.rank === 'A').length === 1;
                const hasLastKing = player.hand.filter(c => c.rank === 'K').length === 1;
                let opts = [...originalOptions];
                
                if (preserveAK && handSize >= 4) {
                    opts = opts.filter(opt => {
                        if (wouldWinGameThisTurn(player, opt)) return true;
                        if (hasLastAce && opt.cards[0].rank === 'A') return false;
                        if (hasLastKing && opt.cards[0].rank === 'K') return false;
                        return true;
                    });
                }
                
                if (opts.length === 0) opts = [...originalOptions];
                
                const safeMove = opts[opts.length - 1];
                
                if (Math.random() < 0.2) {
                    const bold = pickBoldConservativeMove(originalOptions, opts, safeMove, player, danger);
                    if (bold) return bold;
                }
                
                return safeMove;
            }
            
            // Strategy: Aggressive
            if (strategy === 'aggressive') {
                let opts = [...originalOptions];
                if (preserveAK && handSize >= 4) {
                    const hasLastAce = player.hand.filter(c => c.rank === 'A').length === 1;
                    const hasLastKing = player.hand.filter(c => c.rank === 'K').length === 1;
                    const filtered = opts.filter(opt => {
                        if (wouldWinGameThisTurn(player, opt)) return true;
                        if (hasLastAce && opt.cards[0].rank === 'A') return false;
                        if (hasLastKing && opt.cards[0].rank === 'K') return false;
                        return true;
                    });
                    if (filtered.length > 0) opts = filtered;
                }
                
                const fourOfAKind = opts.find(opt => opt.count === 4);
                if (fourOfAKind) return fourOfAKind;
                return opts[0];
            }
            
            // Strategy: Balanced (default)
            let opts = [...originalOptions];
            if (preserveAK && handSize >= 4) {
                const hasLastAce = player.hand.filter(c => c.rank === 'A').length === 1;
                const hasLastKing = player.hand.filter(c => c.rank === 'K').length === 1;
                const filtered = opts.filter(opt => {
                    if (wouldWinGameThisTurn(player, opt)) return true;
                    if (hasLastAce && opt.cards[0].rank === 'A') return false;
                    if (hasLastKing && opt.cards[0].rank === 'K') return false;
                    return true;
                });
                if (filtered.length > 0) opts = filtered;
            }
            
            if (handSize > 4) {
                const singles = opts.filter(opt => opt.count === 1);
                if (singles.length > 0) opts = singles;
            }
            
            const fourOfAKind = opts.find(opt => opt.count === 4);
            if (fourOfAKind) {
                const lowestRank = Math.min(...player.hand.map(c => rankValues[c.rank]));
                if (rankValues[fourOfAKind.cards[0].rank] === lowestRank) {
                    return fourOfAKind;
                }
            }
            
            return opts[opts.length - 1];
        }

        function pickBoldConservativeMove(originalOptions, filteredOptions, safeMove, player, danger) {
            const candidates = [];
            const singlesHigh = filteredOptions.filter(o => o.count === 1 && o.value > safeMove.value);
            if (singlesHigh.length > 0) candidates.push(pickRandomElement(singlesHigh));
            
            const four = originalOptions.find(o => o.count === 4);
            if (four && !moveOptionEquals(four, safeMove)) {
                const lowestRank = Math.min(...player.hand.map(c => rankValues[c.rank]));
                if (rankValues[four.cards[0].rank] !== lowestRank || danger) {
                    candidates.push(four);
                }
            }
            
            const idx = filteredOptions.findIndex(o => moveOptionEquals(o, safeMove));
            if (idx > 0) {
                const secondLow = filteredOptions[idx - 1];
                if (!moveOptionEquals(secondLow, safeMove)) candidates.push(secondLow);
            }
            
            const riskySingles = originalOptions.filter(o => o.count === 1 && o.value >= rankValues['Q']);
            if (riskySingles.length > 0 && !moveOptionEquals(riskySingles[0], safeMove)) {
                candidates.push(riskySingles[0]);
            }
            
            const uniq = [];
            const seen = new Set();
            for (const c of candidates) {
                const k = c.cards.map(x => x.rank + x.suit).sort().join('|');
                if (!seen.has(k)) {
                    seen.add(k);
                    uniq.push(c);
                }
            }
            if (uniq.length === 0) return null;
            return pickRandomElement(uniq);
        }

        function findPlayableCards(hand) {
            const rankGroups = {};
            hand.forEach(card => {
                if (!rankGroups[card.rank]) rankGroups[card.rank] = [];
                rankGroups[card.rank].push(card);
            });
            
            const playable = [];
            const topValue = rankValues[gameState.topCard.rank];
            
            for (let rank in rankGroups) {
                const value = rankValues[rank];
                if (value >= topValue) {
                    const cards = rankGroups[rank];
                    
                    if (cards.length >= 1) {
                        playable.push({ cards: [cards[0]], value, count: 1 });
                    }
                    
                    if (cards.length === 4) {
                        playable.push({ cards: cards, value, count: 4 });
                    }
                    
                    if (cards.length === 3 && rank == 9 && gameState.topCard.rank === 9) {
                        playable.push({ cards: cards, value, count: 3 });
                    }
                }
            }
            
            return playable.sort((a, b) => b.value - a.value);
        }

        // ============================================
        // GAME FLOW
        // ============================================

        function nextTurn() {
            let attempts = 0;
            do {
                gameState.currentPlayer = (gameState.currentPlayer + 1) % 4;
                attempts++;
            } while (gameState.players[gameState.currentPlayer].eliminated && attempts < 4);
            
            updateDisplay();
            
            if (gameState.players[gameState.currentPlayer].isAI) {
                setTimeout(processAITurn, gameState.fastMode ? 50 : 1000);
            }
        }

        function eliminatePlayer(playerIndex) {
            const player = gameState.players[playerIndex];
            player.eliminated = true;
            player.hand = [];
            showMessage(`✅ ${player.name} is SAFE! Out of cards!`);
            
            if (!checkGameEnd()) {
                setTimeout(() => nextTurn(), gameState.fastMode ? 50 : 1500);
            }
        }

        function checkGameEnd() {
            const playersWithCards = gameState.players.filter(p => !p.eliminated);
            
            if (playersWithCards.length === 1) {
                const loser = playersWithCards[0];
                gameState.gameOver = true;
                endGame(loser);
                return true;
            }
            
            return false;
        }

        function endGame(loser) {
            showMessage(`💀 ${loser.name} LOSES! Everyone else is safe!`);
            
            stats.gamesPlayed++;
            const humanPlayed = !gameState.players[0].isAI;
            const humanWon = humanPlayed && gameState.players[0] !== loser;
            if (humanWon) stats.humanWins++;
            if (loser.isAI) {
                const winners = gameState.players.filter(p => p !== loser);
                winners.forEach(winner => {
                    if (winner.strategy === 'conservative') stats.conservativeWins++;
                    else if (winner.strategy === 'aggressive') stats.aggressiveWins++;
                    else if (winner.strategy === 'balanced') stats.balancedWins++;
                });
            }
            
            updateStats();
            
            if (gameState.simulationMode) {
                scheduleNextSimulationGame();
            } else if (!gameState.fastMode) {
                showGameOver(`💀 ${loser.name} LOSES!`);
            }
        }

        function scheduleNextSimulationGame() {
            if (!gameState.simulationMode || gameState.simulationCount >= gameState.simulationTotal) {
                gameState.simulationMode = false;
                showMessage(`Simulation complete! Played ${gameState.simulationTotal} games.`);
                return;
            }
            gameState.simulationCount++;
            if (gameState.simulationCount % 10 === 0) {
                showMessage(`Simulated ${gameState.simulationCount}/${gameState.simulationTotal} games...`);
            }
            setTimeout(initGame, 100);
        }

        function showGameOver(message) {
            const gameOverDiv = document.createElement('div');
            gameOverDiv.className = 'game-over';
            gameOverDiv.innerHTML = `
                <div class="game-over-content">
                    <h2>Game Over!</h2>
                    <p>${message}</p>
                    <button onclick="closeGameOver(); newGame();">New Game</button>
                    <button onclick="closeGameOver();" class="secondary">Close</button>
                </div>
            `;
            document.body.appendChild(gameOverDiv);
        }

        function closeGameOver() {
            const gameOver = document.querySelector('.game-over');
            if (gameOver) gameOver.remove();
        }

        // ============================================
        // STATISTICS
        // ============================================

        function updateStats() {
            document.getElementById('gamesPlayed').textContent = stats.gamesPlayed;
            document.getElementById('humanWins').textContent = stats.humanWins;
            document.getElementById('conservativeWins').textContent = stats.conservativeWins;
            document.getElementById('aggressiveWins').textContent = stats.aggressiveWins;
            document.getElementById('balancedWins').textContent = stats.balancedWins;
        }

        function resetStats() {
            if (confirm('Reset all statistics?')) {
                stats = {
                    gamesPlayed: 0,
                    humanWins: 0,
                    conservativeWins: 0,
                    aggressiveWins: 0,
                    balancedWins: 0
                };
                updateStats();
                document.getElementById('gameLog').innerHTML = '';
            }
        }

        // ============================================
        // SIMULATION
        // ============================================

        function runSimulation(numGames) {
            gameState.fastMode = true;
            gameState.simulationMode = true;
            gameState.simulationTotal = numGames;
            gameState.simulationCount = 0;
            showMessage(`Starting simulation of ${numGames} games...`);
            
            gameState.autoBattleMode = true;
            gameState.players[0].isAI = true;
            gameState.players[0].strategy = 'balanced';
            gameState.players[1].strategy = document.getElementById('ai1Strategy').value;
            gameState.players[2].strategy = document.getElementById('ai2Strategy').value;
            gameState.players[3].strategy = document.getElementById('ai3Strategy').value;
            
            initGame();
        }

        // Initialize on load
        updateStats();
        syncPauseButton();
    </script>
