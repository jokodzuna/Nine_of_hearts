<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nine of Hearts</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="welcomeScreen">
        <!-- Split title screen — each half clips 50 % of the same centred title.
             After 2 s the two halves slide apart as lift doors. -->
        <div class="lift-door lift-door-left">
            <div class="door-inner">
                <div class="door-content">
                    <div class="door-title">
                        <div>NINE</div>
                        <div class="door-of"><span>OF</span></div>
                        <div>HEARTS</div>
                    </div>
                    <div class="door-tagline">DON'T BE A LOSER!</div>
                </div>
            </div>
        </div>
        <div class="lift-door lift-door-right">
            <div class="door-inner">
                <div class="door-content">
                    <div class="door-title">
                        <div>NINE</div>
                        <div class="door-of"><span>OF</span></div>
                        <div>HEARTS</div>
                    </div>
                    <div class="door-tagline">DON'T BE A LOSER!</div>
                </div>
            </div>
        </div>

        <!-- Green menu revealed behind the doors -->
        <div class="welcome-menu">
            <div id="profileWidget" class="profile-widget">
                <img id="profileWidgetImg" class="profile-widget-img" src="Images/user-avatars/default-man_result.webp" alt="Avatar">
                <div id="profileWidgetName" class="profile-widget-name">Player</div>
            </div>
            <div class="coin-widget">
                <span class="coin-emoji">&#129689;</span>
                <span id="coinBalance">0</span>
            </div>
            <div class="menu-main-buttons">
                <button class="menu-btn" id="howToPlayBtn">How to Play</button>
                <button class="menu-btn" id="playersBtn">Players</button>
                <button class="menu-btn" id="difficultyBtn">Difficulty</button>
                <button class="menu-btn" id="multiBtn">Multiplayer</button>
                <button class="menu-btn" id="settingsBtn">⚙️  Settings</button>
            </div>
            <button class="menu-btn menu-btn-start" id="startButton" type="button">&#9654; START</button>
            <button class="menu-btn menu-btn-exit" id="exitButton" type="button">EXIT</button>
        </div>
    </div>

    <div id="tapToStart"><h1>&#128070; Tap to Start</h1></div>

    <div class="game-container">
        <div class="game-table">
            <div class="player-area player-top">
                <div class="player-info" id="player2Info">
                    <div class="avatar-container"><div class="avatar">&#128104;</div></div>
                    <div class="player-name-score"><div class="player-name">John</div></div>
                </div>
                <div class="cards" id="player2Cards"></div>
            </div>

            <div class="player-area player-left">
                <div class="player-info" id="player3Info">
                    <div class="avatar-container"><div class="avatar">&#128105;</div></div>
                    <div class="player-name-score"><div class="player-name">Carol</div></div>
                </div>
                <div class="cards" id="player3Cards"></div>
            </div>

            <div class="center-area">
                <div class="pile" id="pile"></div>
                <div class="message" id="message"></div>
            </div>

            <div class="player-area player-right">
                <div class="cards" id="player1Cards"></div>
                <div class="player-info" id="player1Info">
                    <div class="avatar-container"><div class="avatar">&#128103;</div></div>
                    <div class="player-name-score"><div class="player-name">Lisa</div></div>
                </div>
            </div>

            <div class="player-area player-bottom">
                <div class="cards" id="yourCards"></div>
                <div class="bottom-controls">
                    <button class="draw-button" id="drawButton">Draw 3</button>
                    <div class="player-info" id="yourInfo">
                        <div class="avatar-container"><div class="avatar">&#129489;</div></div>
                        <div class="player-name-score"><div class="player-name">You</div></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Botfather intro overlay: video → door crossfade → animated interlocking doors -->
    <div id="botfatherOverlay" class="botfather-overlay" style="display:none">
        <video id="botfatherVideo" playsinline webkit-playsinline></video>
        <div id="bfDarkVeil" class="bf-dark-veil"></div>
        <div id="botfatherDoor" class="botfather-door">
            <div id="doorLeft"  class="door-panel door-left"></div>
            <div id="doorRight" class="door-panel door-right"></div>
        </div>
    </div>
    <!-- Fades from 0.6→0 after metal door opens to reveal the game arena -->
    <div id="bfRevealVeil" class="bf-reveal-veil" style="display:none"></div>

    <script type="module" src="user-profile.js"></script>
    <script type="module" src="ui-manager.js"></script>
    <script type="module" src="game-controller.js"></script>
</body>
</html>
